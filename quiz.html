<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>

<body>
    <section class="hero">
        <div class="mid_align">
            <h1> Quiz </h1>
        </div>
    </section>
    <section class="quiz">
        <div>
            <h3>Hva er hovedstaden i Norge ?</h3>
            <div class="spm">
                <button onclick="sjekkSvar(this, true)">Oslo</button>
                <button onclick="sjekkSvar(this, false)">Stockholm</button>
                <button onclick="sjekkSvar(this, false)">London</button>
            </div>
        </div>

        <div id="spm2">
            <h3>Hva er 2 + 2 ?</h3>
            <div class="spm">
                <button onclick="sjekkSvarMedId('spm2', false)">2</button>
                <button onclick="sjekkSvarMedId('spm2', true)">4</button>
                <button onclick="sjekkSvarMedId('spm2', false)">6</button>
            </div>
        </div>

        <div>
            <h3>Hvor mange planeter er det solsystemet ?</h3>
            <div class="spm">
                <input type="text" onkeypress="handleEnter(event, 8, this)">
                <button onclick="sjekkSvarMedInput(8, this)">Svar</button>
            </div>
        </div>

        <div>
            <h3>Hva er 3+4 ?</h3>
            <div class="spm">
                <input type="text" onkeypress="handleEnter(event, 7, this)">
                <button onclick="sjekkSvarMedInput(7, this)">Svar</button>
            </div>
        </div>

        <div>
            <h3>Hva er 5+5 ?</h3>
            <div class="spm">
                <input type="text" onkeypress="handleEnter(event, 10, this)">
                <button onclick="sjekkSvarMedInput(10, this)">Svar</button>
            </div>
        </div>

        <div id="spm6">
            <h3>Hvilken farge er himmelen ?</h3>
            <div class="spm">
                <button onclick="sjekkSvarMedId('spm6', false)">Rød</button>
                <button onclick="sjekkSvarMedId('spm6', true)">Blå</button>
                <button onclick="sjekkSvarMedId('spm6', false)">Grønn</button>
            </div>
        </div>

        <div>
            <h3>Hvor mange dager er det i en uke ?</h3>
            <div class="spm">
                <button onclick="sjekkSvar(this, false)">5</button>
                <button onclick="sjekkSvar(this, true)">7</button>
                <button onclick="sjekkSvar(this, false)">10</button>
            </div>
        </div>

        <div>
            <h3>Hva er 10 x 2 ?</h3>
            <div class="spm">
                <input type="text" onkeypress="handleEnter(event, 20, this)">
                <button onclick="sjekkSvarMedInput(20, this)">Svar</button>
            </div>
        </div>
    </section>

      <script src="quiz.js"></script>
</body>

</html>
