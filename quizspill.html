<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matte quiz</title>

    <link rel="stylesheet" href="quizspill.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <header>

        <nav>
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">Σ</span>
                <span class="logo-text">Matte</span>
            </a>

            <ul>
                <li><a href="index.html"><i class="fa-solid fa-house"></i></a></li>
                <li><a href="kalkulator.html">Kalkulator</a></li>
                <li><a href="quizspill.html">Mattequiz</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1> Matte quiz</h1>

        <p>Dra kula bakover og slipp for å skyte. Treff en kule og svar på spørsmålet!</p>
        <div class="boble boble-1"></div>
        <div class="boble boble-2"></div>
        <div class="boble boble-3"></div>
    </section>

    <section class="game">

        <div class="targets">
            <div class="target "></div>
            <div class="target "></div>
            <div class="target "></div>
            <div class="target "></div>
            <div class="target "></div>
        </div>

        <div class="ball"></div>

        <div class="bar"></div>

        <div id="quiz-popup" class="skjult">
            <div id="quiz-boks">
                <h2 id="quiz-spørsmål">Spørsmål her</h2>
                <input type="text" id="quiz-input" placeholder="Skriv svar...">
                <button onclick="sjekkSvar()">Sjekk svar</button>
                <button id="neste-knapp" class="skjult" onclick="lukkQuiz()">Neste</button>
            </div>
        </div>

    </section>

    <script src="quizspill.js"></script>
